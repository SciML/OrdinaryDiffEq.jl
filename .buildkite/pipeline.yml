steps:
  - label: "GPU"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
           coverage: false # 1000x slowdown
    agents:
      queue: "juliagpu"
      cuda: "*"
    env:
      GROUP: 'GPU'
      JULIA_PKG_SERVER: "" # it often struggles with our large artifacts
      # SECRET_CODECOV_TOKEN: "..."
    timeout_in_minutes: 60
    # Don't run Buildkite if the commit message includes the text [skip tests]
    if: build.message !~ /\[skip tests\]/

  - label: "{{matrix.group}} v{{matrix.version}}"
    matrix:
      setup:
        version:
          - "1"
        group:
          - "Multithreading"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "{{matrix.version}}"
      GROUP: "{{matrix.group}}"
      JULIA_NUM_THREADS: 2
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 240
    # Don't run Buildkite if the commit message includes the text [skip tests]
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: weak convergence and multithreading tests (240 min timeout)
  - label: "SDE {{matrix.group}}"
    matrix:
      setup:
        group:
          - "StochasticDiffEq_Multithreaded"
          - "StochasticDiffEq_OOPWeakConvergence"
          - "StochasticDiffEq_IIPWeakConvergence"
          - "StochasticDiffEq_WeakConvergence2"
          - "StochasticDiffEq_WeakConvergence3"
          - "StochasticDiffEq_WeakConvergence6"
          - "StochasticDiffEq_WeakAdaptiveCPU"
    env:
      GROUP: "{{matrix.group}}"
      JULIA_NUM_THREADS: auto
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: exclusive-agent weak convergence tests (240 min timeout)
  - label: "SDE {{matrix.group}}"
    matrix:
      setup:
        group:
          - "StochasticDiffEq_SROCKC2WeakConvergence"
          - "StochasticDiffEq_WeakConvergence5"
    env:
      GROUP: "{{matrix.group}}"
      JULIA_NUM_THREADS: auto
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
      exclusive: true
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: extended timeout weak convergence test (360 min)
  - label: "SDE StochasticDiffEq_WeakConvergence4"
    env:
      GROUP: "StochasticDiffEq_WeakConvergence4"
      JULIA_NUM_THREADS: auto
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 360
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: GPU weak adaptive tests
  - label: "SDE WeakAdaptiveGPU"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      queue: "juliagpu"
      cuda: "*"
    env:
      GROUP: 'StochasticDiffEq_WeakAdaptiveGPU'
      JULIA_PKG_SERVER: ""
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/
