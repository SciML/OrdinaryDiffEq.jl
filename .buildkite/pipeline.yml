steps:
  - label: "GPU"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
           coverage: false # 1000x slowdown
    agents:
      queue: "juliagpu"
      cuda: "*"
    env:
      GROUP: 'GPU'
      JULIA_PKG_SERVER: "" # it often struggles with our large artifacts
      # SECRET_CODECOV_TOKEN: "..."
    timeout_in_minutes: 60
    # Don't run Buildkite if the commit message includes the text [skip tests]
    if: build.message !~ /\[skip tests\]/

  - label: "{{matrix.group}} v{{matrix.version}}"
    matrix:
      setup:
        version:
          - "1"
        group:
          - "Multithreading"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "{{matrix.version}}"
      GROUP: "{{matrix.group}}"
      JULIA_NUM_THREADS: 2
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 240
    # Don't run Buildkite if the commit message includes the text [skip tests]
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: multithreaded jump tests
  - label: "SDE Multithreaded"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "1"
      GROUP: "StochasticDiffEq_Multithreaded"
      JULIA_NUM_THREADS: 2
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: heavy weak convergence tests (1M-30M trajectories, need self-hosted runners)
  - label: "{{matrix}}"
    matrix:
        - "StochasticDiffEqWeak_WeakConvergence2"
        - "StochasticDiffEqWeak_WeakConvergence3"
        - "StochasticDiffEqWeak_WeakConvergence6"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "1"
      GROUP: "{{matrix}}"
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: WeakConvergence4 needs extended timeout
  - label: "StochasticDiffEqWeak_WeakConvergence4"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "1"
      GROUP: "StochasticDiffEqWeak_WeakConvergence4"
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
    timeout_in_minutes: 360
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: convergence tests needing exclusive runner
  - label: "{{matrix}}"
    matrix:
        - "StochasticDiffEqROCK_SROCKC2WeakConvergence"
        - "StochasticDiffEqWeak_WeakConvergence5"
    env:
      BUILDKITE_PLUGIN_JULIA_VERSION: "1"
      GROUP: "{{matrix}}"
    plugins:
      - JuliaCI/julia#v1
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      os: "linux"
      queue: "juliaecosystem"
      arch: "x86_64"
      exclusive: true
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/

  # StochasticDiffEq: GPU weak adaptive tests
  - label: "SDE WeakAdaptiveGPU"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - JuliaCI/julia-test#v1:
          coverage: false
    agents:
      queue: "juliagpu"
      cuda: "*"
    env:
      GROUP: 'StochasticDiffEq_WeakAdaptiveGPU'
      JULIA_PKG_SERVER: ""
    timeout_in_minutes: 240
    if: build.message !~ /\[skip tests\]/
