name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: ${{ matrix.group == 'Downstream' }}
    strategy:
      fail-fast: false
      matrix:
        group:
          - InterfaceI
          - InterfaceII
          - InterfaceIII
          - InterfaceIV
          - InterfaceV
          - Integrators_I
          - Integrators_II
          - AlgConvergence_I
          - AlgConvergence_II
          - AlgConvergence_III
          - ModelingToolkit
          - Downstream
          - ODEInterfaceRegression
          - QA
          - Regression_I
          - Regression_II
          - AD
        version:
          - 'lts'
          - '1.11'
          - '1'
          - 'pre'
        exclude:
          - group: AD
            version: '1'
          - group: AD
            version: 'pre'
          # Skip ODEInterfaceRegression until ODEInterface.jl is fixed upstream
          # See: https://github.com/SciML/OrdinaryDiffEq.jl/issues/2987
          - group: ODEInterfaceRegression
            version: '1'
          - group: ODEInterfaceRegression
            version: 'pre'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: false
          check_bounds: auto
        env:
          GROUP: ${{ matrix.group }}
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          disable_safe_directory: true
