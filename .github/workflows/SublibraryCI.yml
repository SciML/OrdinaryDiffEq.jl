name: Sublibrary CI
on:
  pull_request:
    branches:
      - master
      - v7
  push:
    branches:
      - master
      - v7
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of {group, version, runner, timeout, num_threads} objects for matrix include
      matrix: ${{ steps.compute.outputs.matrix }}
      # Whether any sublibraries are affected
      has_changes: ${{ steps.compute.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - name: Compute affected sublibraries from dependency graph
        id: compute
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # For push events, compare against the previous commit
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            # For pull requests, compare against the base branch
            git fetch origin ${{ github.event.pull_request.base.ref }}
            CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          fi

          MATRIX=$(echo "$CHANGED" | julia .github/scripts/compute_affected_sublibraries.jl .)

          echo "Changed files in lib/:"
          echo "$CHANGED" | grep "^lib/" || echo "(none)"
          echo ""
          echo "Matrix entries: $MATRIX"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      actions: write
      contents: read
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      # Same workaround as CI.yml: only write the cache from master pushes
      # to avoid the Azure SAS auth failure storm during PR matrix uploads.
      # SublibraryCI's matrix shape is dynamic (group/version/runner/timeout/
      # num_threads), so we don't try to construct a restore-only key for
      # PRs here — PRs simply skip the cache. This workflow only fires when
      # files in lib/ change, so the lost cache hit on PRs is small.
      - name: Cache Julia depot (push only)
        if: github.event_name == 'push'
        uses: julia-actions/cache@v3
        continue-on-error: true
        with:
          cache-compiled: 'false'
      - name: Refresh General registry directly from git
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          # Force a fresh git clone of General to dodge pkg server lag.
          # Must run BEFORE the Pkg.develop step below: that step's resolve
          # needs current versions of registered deps (e.g. SciMLBase v3),
          # and the cached pkg-server registry is often several days stale,
          # so develop's resolve fails with "expected package <X> to be
          # registered".
          try
              Pkg.Registry.rm("General")
          catch
          end
          Pkg.Registry.add(Pkg.RegistrySpec(url = "https://github.com/JuliaRegistries/General.git"))
      - name: Develop local path deps (Julia < 1.11)
        shell: julia --color=yes --project=. {0}
        run: |
          using Pkg
          if VERSION < v"1.11.0-DEV.0"
            toml = Pkg.TOML.parsefile("Project.toml")
            if haskey(toml, "sources")
              specs = Pkg.PackageSpec[]
              for (dep, spec) in toml["sources"]
                if spec isa Dict && haskey(spec, "path") && isdir(spec["path"])
                  @info "Developing" dep spec["path"]
                  push!(specs, Pkg.PackageSpec(path=spec["path"]))
                end
              end
              # Batch the develop call so Pkg resolves all path deps together.
              isempty(specs) || Pkg.develop(specs)
            end
          end
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: false
          check_bounds: auto
        env:
          GROUP: ${{ matrix.group }}
          JULIA_NUM_THREADS: ${{ matrix.num_threads }}
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          disable_safe_directory: true
