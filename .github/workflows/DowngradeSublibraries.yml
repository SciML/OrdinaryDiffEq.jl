name: Downgrade Sublibraries
on:
  pull_request:
    branches:
      - master
      - v7
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
      - v7
    paths-ignore:
      - 'docs/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  downgrade-sublibraries:
    uses: "SciML/.github/.github/workflows/sublibrary-downgrade.yml@v1"
    secrets: "inherit"
    with:
      julia-version: "1.11"
      skip: "Pkg,TOML,Statistics,LinearAlgebra,SparseArrays,InteractiveUtils,OrdinaryDiffEqCore,OrdinaryDiffEqNonlinearSolve,OrdinaryDiffEqDifferentiation"
      group-env-name: "ODEDIFFEQ_TEST_GROUP"
      group-env-value: "Core"
      allow-reresolve: true
      # All lib/* sublibraries are downgrade-tested (projects auto-discovered).
      # Only these stay excluded: their test failures are documented as
      # unrelated to downgrade bounds (VectorOfArray/StructArray incompat and
      # FineRKN4/DPRKN4 convergence-order), so they'd be false reds here.
      exclude: "OrdinaryDiffEqLowStorageRK OrdinaryDiffEqRKN OrdinaryDiffEqSSPRK"
