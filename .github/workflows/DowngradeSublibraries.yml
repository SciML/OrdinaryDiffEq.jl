name: Downgrade Sublibraries
on:
  pull_request:
    branches:
      - master
      - v7
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
      - v7
    paths-ignore:
      - 'docs/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  downgrade-sublibraries:
    uses: "SciML/.github/.github/workflows/sublibrary-downgrade.yml@v1"
    secrets: "inherit"
    with:
      julia-version: "1.11"
      skip: "Pkg,TOML,Statistics,LinearAlgebra,SparseArrays,InteractiveUtils,OrdinaryDiffEqCore,OrdinaryDiffEqNonlinearSolve,OrdinaryDiffEqDifferentiation"
      group-env-name: "ODEDIFFEQ_TEST_GROUP"
      group-env-value: "Core"
      allow-reresolve: true
      projects: >-
        lib/ImplicitDiscreteSolve lib/OrdinaryDiffEqAdamsBashforthMoulton lib/OrdinaryDiffEqBDF
        lib/OrdinaryDiffEqCore lib/OrdinaryDiffEqDefault lib/OrdinaryDiffEqDifferentiation
        lib/OrdinaryDiffEqExplicitRK lib/OrdinaryDiffEqExponentialRK lib/OrdinaryDiffEqExtrapolation
        lib/OrdinaryDiffEqFIRK lib/OrdinaryDiffEqFeagin lib/OrdinaryDiffEqFunctionMap
        lib/OrdinaryDiffEqHighOrderRK lib/OrdinaryDiffEqIMEXMultistep lib/OrdinaryDiffEqLinear
        lib/OrdinaryDiffEqLowOrderRK lib/OrdinaryDiffEqNonlinearSolve lib/OrdinaryDiffEqNordsieck
        lib/OrdinaryDiffEqPDIRK lib/OrdinaryDiffEqPRK lib/OrdinaryDiffEqQPRK
        lib/OrdinaryDiffEqRosenbrock lib/OrdinaryDiffEqSDIRK lib/OrdinaryDiffEqStabilizedIRK
        lib/OrdinaryDiffEqStabilizedRK lib/OrdinaryDiffEqSymplecticRK lib/OrdinaryDiffEqTaylorSeries
        lib/OrdinaryDiffEqTsit5 lib/OrdinaryDiffEqVerner lib/SimpleImplicitDiscreteSolve
